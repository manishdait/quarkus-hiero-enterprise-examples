name: Java CI with Maven

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Code Style
        run: |
          ./mvnw spotless:check

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@328bc84c3b00a990a151418144fd682a4eb76ea6 # v0.19.0
        with:
          installMirrorNode: true
          soloVersion: v0.69.0
          mirrorNodeVersion: v0.153.0
          hieroVersion: v0.73.0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        env:
          HIERO_OPERATOR_ACCOUNT: ${{ steps.solo.outputs.accountId }}
          HIERO_OPERATOR_PRIVATE_KEY: ${{ steps.solo.outputs.privateKey }}
          HIERO_NETWORK: "hiero-solo-action"
        run: |
          ./mvnw clean package quarkus:run